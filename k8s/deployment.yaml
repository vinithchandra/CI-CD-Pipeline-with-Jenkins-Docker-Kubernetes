apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-project1
  labels:
    app: devops-project1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-project1
  template:
    metadata:
      labels:
        app: devops-project1
    spec:
      containers:
      - name: devops-project1
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 3000
